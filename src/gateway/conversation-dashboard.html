<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Inspector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface-2: #1c2333; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --orange: #d4760a; --purple: #d2a8ff;
    --radius: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 24px; max-width: 1400px; margin: 0 auto; }
  header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  h1 { font-size: 24px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; }

  .stats-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; text-align: center; min-width: 100px; }
  .stat-card .val { font-size: 22px; font-weight: 700; }
  .stat-card .lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

  .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .controls input, .controls select { padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; outline: none; }
  .controls input:focus, .controls select:focus { border-color: var(--accent); }

  .table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
  th { background: var(--surface-2); font-weight: 600; color: var(--text-dim); text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); cursor: pointer; }
  .empty td { text-align: center; padding: 40px; color: var(--text-dim); font-style: italic; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 500; }
  .badge-active { background: #3fb95022; color: var(--green); }
  .badge-archived { background: #8b949e33; color: var(--text-dim); }
  .badge-provider { background: #58a6ff22; color: var(--accent); }
  .badge-compressed { background: #d2992222; color: var(--yellow); }

  .pagination { display: flex; gap: 4px; justify-content: center; align-items: center; margin-bottom: 16px; }
  .pagination .info { font-size: 13px; color: var(--text-dim); margin: 0 12px; }

  /* Detail panel */
  .detail-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .detail-panel.active { display: flex; }
  .detail-panel .content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; }
  .detail-panel h2 { font-size: 16px; margin-bottom: 12px; }
  .detail-panel .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .detail-panel .meta .item { font-size: 12px; }
  .detail-panel .meta .item .lbl { color: var(--text-dim); }
  .detail-panel .msg { padding: 10px; margin-bottom: 8px; border-radius: 4px; font-size: 12px; }
  .detail-panel .msg.user { background: #58a6ff11; border-left: 3px solid var(--accent); }
  .detail-panel .msg.assistant { background: #3fb95011; border-left: 3px solid var(--green); }
  .detail-panel .msg.system { background: #d2992211; border-left: 3px solid var(--yellow); }
  .detail-panel .msg.tool { background: #d2a8ff11; border-left: 3px solid var(--purple); }
  .detail-panel .msg .header { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
  .detail-panel .msg .content { white-space: pre-wrap; word-break: break-word; }
  .detail-panel .msg .badge-compressed { margin-left: 4px; }

  @media (max-width: 768px) { body { padding: 12px; } .detail-panel .meta { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>💬 Conversation Inspector</h1>
  <div class="btn" onclick="refreshAll()">↻ Refresh</div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="val text-accent" id="sTotal">0</div><div class="lbl">Conversations</div></div>
  <div class="stat-card"><div class="val text-green" id="sActive">0</div><div class="lbl">Active</div></div>
  <div class="stat-card"><div class="val" id="sMessages" style="color:var(--purple)">0</div><div class="lbl">Messages</div></div>
  <div class="stat-card"><div class="val" id="sTokens">0</div><div class="lbl">Total Tokens</div></div>
  <div class="stat-card"><div class="val" id="sCost" style="color:#d2a8ff">$0</div><div class="lbl">Cost</div></div>
</div>

<div class="controls">
  <input id="searchInput" placeholder="Search by ID, client, model..." style="width:200px" oninput="debounceSearch()">
  <select id="filterClient" onchange="refreshAll()"><option value="">All Clients</option></select>
  <select id="filterActive" onchange="refreshAll()"><option value="">All Status</option><option value="true">Active</option><option value="false">Archived</option></select>
</div>

<div class="table-wrap">
  <table>
    <thead><tr>
      <th>ID</th><th>Client</th><th>Model</th><th>Messages</th><th>Provider</th>
      <th>Tokens</th><th>Cost</th><th>Status</th><th>Updated</th>
    </tr></thead>
    <tbody id="tableBody"><tr class="empty"><td colspan="9">Loading...</td></tr></tbody>
  </table>
</div>

<div class="pagination" id="pagination"></div>

<div class="detail-panel" id="detailPanel">
  <div class="content" id="detailContent"></div>
</div>

<script>
const API = '/api/conversations';
let currentPage = 1;
let searchTimer = null;

async function refreshAll() {
  try {
    const search = document.getElementById('searchInput').value.trim();
    const client = document.getElementById('filterClient').value;
    const active = document.getElementById('filterActive').value;

    const params = new URLSearchParams();
    if (search) params.set('search', search);
    if (client) params.set('clientType', client);
    if (active) params.set('active', active);
    params.set('page', String(currentPage));
    params.set('limit', '50');
    params.set('sortBy', 'updatedAt');

    const [listRes, statsRes] = await Promise.all([
      fetch(`${API}?${params}`),
      fetch(`${API}/stats`),
    ]);
    const data = await listRes.json();
    const stats = await statsRes.json();

    renderStats(stats);
    renderTable(data.conversations || []);
    renderPagination(data);

    // Populate client filter
    const sel = document.getElementById('filterClient');
    (data.conversations || []).forEach(c => {
      if (c.clientType && ![...sel.options].some(o => o.value === c.clientType)) {
        const o = document.createElement('option'); o.value = c.clientType; o.textContent = c.clientType;
        sel.appendChild(o);
      }
    });
  } catch { document.getElementById('tableBody').innerHTML = '<tr class="empty"><td colspan="9">Failed to load</td></tr>'; }
}

function renderStats(s) {
  document.getElementById('sTotal').textContent = s.totalConversations || 0;
  document.getElementById('sActive').textContent = s.activeConversations || 0;
  document.getElementById('sMessages').textContent = (s.totalMessages || 0).toLocaleString();
  document.getElementById('sTokens').textContent = (s.totalTokens || 0).toLocaleString();
  document.getElementById('sCost').textContent = '$' + (s.totalCost || 0).toFixed(4);
}

function renderTable(convs) {
  const tbody = document.getElementById('tableBody');
  if (convs.length === 0) { tbody.innerHTML = '<tr class="empty"><td colspan="9">No conversations</td></tr>'; return; }
  tbody.innerHTML = convs.map(c => `<tr onclick="showDetail('${c.id}')">
    <td><code>${esc(c.id.slice(0, 16))}...</code></td>
    <td><span class="badge" style="background:#58a6ff22;color:var(--accent)">${esc(c.clientType)}</span></td>
    <td><code>${esc(c.model)}</code></td>
    <td>${c.messageCount}</td>
    <td>${c.lastProvider ? '<span class="badge badge-provider">'+esc(c.lastProvider)+'</span>' : '—'}</td>
    <td>${(c.tokenUsage?.totalTokens || 0).toLocaleString()}</td>
    <td>$${(c.tokenUsage?.estimatedCost || 0).toFixed(4)}</td>
    <td><span class="badge ${c.active !== false ? 'badge-active' : 'badge-archived'}">${c.active !== false ? 'Active' : 'Archived'}</span></td>
    <td style="font-size:11px;color:var(--text-dim)">${new Date(c.updatedAt).toLocaleString()}</td>
  </tr>`).join('');
}

function renderPagination(data) {
  const el = document.getElementById('pagination');
  if (data.totalPages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `<button class="btn" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>←</button>
    <span class="info">Page ${data.page} of ${data.totalPages} (${data.total})</span>
    <button class="btn" onclick="goPage(${currentPage + 1})" ${currentPage >= data.totalPages ? 'disabled' : ''}>→</button>`;
}

function goPage(p) { currentPage = p; refreshAll(); }

async function showDetail(id) {
  try {
    const res = await fetch(`${API}/${id}`);
    const conv = await res.json();
    const messages = conv.messages || [];
    const el = document.getElementById('detailContent');
    el.innerHTML = `
      <h2>Conversation: ${conv.id}</h2>
      <div class="meta">
        <div class="item"><span class="lbl">Client:</span> ${conv.clientType}</div>
        <div class="item"><span class="lbl">Model:</span> <code>${conv.model}</code></div>
        <div class="item"><span class="lbl">Last Provider:</span> ${conv.lastProvider || '—'}</div>
        <div class="item"><span class="lbl">Created:</span> ${new Date(conv.createdAt).toLocaleString()}</div>
        <div class="item"><span class="lbl">Messages:</span> ${messages.length}</div>
        <div class="item"><span class="lbl">Total Tokens:</span> ${conv.tokenUsage?.totalTokens?.toLocaleString() || 0}</div>
        <div class="item"><span class="lbl">Cost:</span> $${(conv.tokenUsage?.estimatedCost || 0).toFixed(4)}</div>
        <div class="item"><span class="lbl">Compression:</span> ${conv.metadata?.compression?.compressionCount || 0} compressions, ${(conv.metadata?.compression?.tokensSaved || 0).toLocaleString()} tokens saved</div>
        <div class="item"><span class="lbl">${conv.systemPrompt ? 'System: '+esc(conv.systemPrompt) : ''}</span></div>
      </div>
      <div style="max-height:400px;overflow-y:auto">
        ${messages.map(m => `
          <div class="msg ${m.role}">
            <div class="header">
              <span>${m.role}${m.provider ? ' via '+m.provider : ''}</span>
              <span>${m.tokens ? m.tokens+' tokens' : ''} ${m.compressed ? '<span class="badge badge-compressed">compressed</span>' : ''}</span>
            </div>
            <div class="content">${esc(typeof m.content === 'string' ? m.content : JSON.stringify(m.content, null, 2))}</div>
          </div>
        `).join('')}
      </div>
      <button class="btn" onclick="closeDetail()" style="margin-top:12px">Close</button>
    `;
    document.getElementById('detailPanel').classList.add('active');
  } catch { alert('Failed to load conversation'); }
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('active'); }
function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(() => { currentPage = 1; refreshAll(); }, 300); }
function esc(s) { if(!s)return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

document.addEventListener('DOMContentLoaded', () => { refreshAll(); setInterval(refreshAll, 15000); });
document.getElementById('detailPanel').addEventListener('click', (e) => { if (e.target === document.getElementById('detailPanel')) closeDetail(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });
</script>
</body>
</html>

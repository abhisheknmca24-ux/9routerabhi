<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gateway Aliases</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface-2: #1c2333; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --orange: #d4760a; --purple: #d2a8ff;
    --radius: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    padding: 24px; max-width: 1400px; margin: 0 auto; line-height: 1.5;
  }
  header {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  h1 { font-size: 24px; font-weight: 600; }
  .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #79c0ff; }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 20px; text-align: center; min-width: 100px;
  }
  .stat-card .val { font-size: 22px; font-weight: 700; }
  .stat-card .lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

  /* Controls */
  .controls {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
  }
  .controls input, .controls select {
    padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px; outline: none;
  }
  .controls input:focus, .controls select:focus { border-color: var(--accent); }
  .controls input { flex: 1; min-width: 200px; }
  .controls input::placeholder { color: var(--text-dim); }

  /* Table */
  .table-wrap {
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
  }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { background: var(--surface-2); font-weight: 600; color: var(--text-dim); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); }
  .empty td { text-align: center; padding: 40px; color: var(--text-dim); font-style: italic; }

  .toggle {
    position: relative; width: 36px; height: 20px; display: inline-block;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider {
    position: absolute; inset: 0; background: var(--border); border-radius: 10px;
    cursor: pointer; transition: 0.2s;
  }
  .toggle .slider::before {
    content: ''; position: absolute; width: 14px; height: 14px;
    left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s;
  }
  .toggle input:checked + .slider { background: var(--green); }
  .toggle input:checked + .slider::before { transform: translateX(16px); }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500;
  }
  .badge-combo { background: #58a6ff33; color: var(--accent); }
  .badge-model { background: #3fb95033; color: var(--green); }
  .badge-enabled { background: #3fb95022; color: var(--green); }
  .badge-disabled { background: #f8514922; color: var(--red); }
  .badge-idle { background: #8b949e33; color: var(--text-dim); }

  .prio { font-size: 13px; font-weight: 600; color: var(--yellow); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; width: 90%; max-width: 560px; max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { font-size: 18px; margin-bottom: 16px; }
  .modal .form-group { margin-bottom: 14px; }
  .modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text-dim); }
  .modal input, .modal select, .modal textarea {
    width: 100%; padding: 8px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-size: 14px; outline: none; font-family: var(--font);
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 50px; }
  .modal .form-error { color: var(--red); font-size: 13px; margin-bottom: 12px; display: none; }
  .modal .field-error { color: var(--red); font-size: 12px; margin-top: 2px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Preview / Test Panel */
  .test-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .test-panel input { flex: 1; min-width: 150px; }
  .test-result {
    font-size: 13px; padding: 6px 12px; border-radius: 4px; background: var(--surface-2);
    flex: 1; min-width: 200px;
  }
  .test-result.success { color: var(--green); border-left: 3px solid var(--green); }
  .test-result.disabled { color: var(--yellow); border-left: 3px solid var(--yellow); }
  .test-result.not-found { color: var(--red); border-left: 3px solid var(--red); }

  /* Pagination */
  .pagination {
    display: flex; gap: 4px; justify-content: center; align-items: center; margin-bottom: 16px;
  }
  .pagination .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pagination .info { font-size: 13px; color: var(--text-dim); margin: 0 12px; }

  /* Toast */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 20px; border-radius: var(--radius); font-size: 14px; animation: slideIn 0.3s ease; }
  .toast-success { background: var(--green); color: #fff; }
  .toast-error { background: var(--red); color: #fff; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  @media (max-width: 768px) { body { padding: 12px; } .stats-bar { flex-direction: column; } }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔀 Gateway Aliases</h1>
    <div class="subtitle">Universal Model Alias Engine — map any model name to any combo or provider</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <input type="file" id="importFile" accept=".json" style="display:none">
    <button class="btn" onclick="document.getElementById('importFile').click()">📥 Import</button>
    <button class="btn" onclick="exportAliases()">📤 Export</button>
    <button class="btn btn-primary" onclick="openCreate()">+ New Alias</button>
    <button class="btn" onclick="refreshAll()">↻</button>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="val text-accent" id="statTotal">0</div><div class="lbl">Total</div></div>
  <div class="stat-card"><div class="val text-green" id="statEnabled">0</div><div class="lbl">Enabled</div></div>
  <div class="stat-card"><div class="val text-red" id="statDisabled">0</div><div class="lbl">Disabled</div></div>
  <div class="stat-card"><div class="val" id="statRequests" style="color:var(--purple)">0</div><div class="lbl">Requests</div></div>
</div>

<div class="controls">
  <input id="searchInput" placeholder="Search aliases by name, target, or description..." oninput="debounceSearch()">
  <select id="filterType" onchange="refreshAll()">
    <option value="">All Types</option>
    <option value="combo">Combo</option>
    <option value="model">Model</option>
  </select>
  <select id="filterStatus" onchange="refreshAll()">
    <option value="">All Status</option>
    <option value="enabled">Enabled</option>
    <option value="disabled">Disabled</option>
  </select>
  <select id="sortBy" onchange="refreshAll()">
    <option value="priority">Sort: Priority</option>
    <option value="name">Sort: Name</option>
    <option value="createdAt">Sort: Created</option>
    <option value="updatedAt">Sort: Updated</option>
  </select>
</div>

<div class="test-panel">
  <strong style="font-size:13px;color:var(--text-dim)">🔍 Preview Routing</strong>
  <input id="previewInput" placeholder="Enter model name (e.g. claude-sonnet-4-5, gpt-4.1)..." onkeydown="if(event.key==='Enter')previewAlias()">
  <button class="btn btn-sm" onclick="previewAlias()">Test</button>
  <div id="previewResult" class="test-result not-found" style="display:none"></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:40px">On</th>
        <th style="width:40px">#</th>
        <th>Alias</th>
        <th>Destination</th>
        <th>Type</th>
        <th>Requests</th>
        <th>Success</th>
        <th>Description</th>
        <th style="width:110px">Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr class="empty"><td colspan="9">Loading...</td></tr>
    </tbody>
  </table>
</div>

<div class="pagination" id="pagination"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Create Alias</h2>
    <div id="modalErrors" class="form-error"></div>
    <div class="form-group">
      <label>Alias Name</label>
      <input id="inputName" placeholder="e.g. claude-sonnet-4-5" maxlength="64">
      <div id="errorName" class="field-error"></div>
    </div>
    <div class="form-group">
      <label>Target Type</label>
      <select id="inputTargetType" onchange="updateTargetHelp()">
        <option value="combo">Combo Profile</option>
        <option value="model">Direct Model ID</option>
      </select>
    </div>
    <div class="form-group">
      <label id="targetLabel">Target Combo Profile</label>
      <input id="inputTarget" placeholder="e.g. Coding" list="comboList">
      <datalist id="comboList">
        <option value="Coding"><option value="Reasoning"><option value="Chat">
        <option value="Balanced"><option value="Vision"><option value="Research">
        <option value="Fast"><option value="Long_Context"><option value="Planning">
      </datalist>
      <div id="errorTarget" class="field-error"></div>
    </div>
    <div class="form-group" style="display:flex;gap:16px">
      <div style="flex:1">
        <label>Priority</label>
        <input id="inputPriority" type="number" value="0" min="0" max="9999">
      </div>
      <div style="flex:1;display:flex;align-items:flex-end;padding-bottom:8px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="inputEnabled" checked> Enabled
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>Description (optional)</label>
      <textarea id="inputDescription" placeholder="What this alias is for..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveAlias()">Create Alias</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ─── State ───
let editingName = null;
let searchTimer = null;
let currentPage = 1;
const PAGE_SIZE = 50;

const API = '/api/aliases';
const COMBO_PROFILES = ['Coding','Reasoning','Chat','Balanced','Vision','Research','Fast','Long_Context','Planning'];

// ─── Load ───
async function loadAliases(page) {
  if (page !== undefined) currentPage = page;
  const search = document.getElementById('searchInput').value.trim();
  const type = document.getElementById('filterType').value;
  const status = document.getElementById('filterStatus').value;
  const sortBy = document.getElementById('sortBy').value;

  const params = new URLSearchParams();
  if (search) params.set('search', search);
  if (type) params.set('targetType', type);
  if (status) params.set('enabled', status === 'enabled' ? 'true' : 'false');
  params.set('sortBy', sortBy);
  params.set('page', String(currentPage));
  params.set('limit', String(PAGE_SIZE));

  try {
    const [listRes, statsRes] = await Promise.all([
      fetch(`${API}?${params}`),
      fetch(`${API}/stats`),
    ]);
    const data = await listRes.json();
    const stats = await statsRes.json();

    renderStats(stats);
    renderTable(data.aliases || []);
    renderPagination(data);
  } catch {
    document.getElementById('tableBody').innerHTML = '<tr class="empty"><td colspan="9">Failed to load. Is the alias engine running on port 20132?</td></tr>';
  }
}

function renderStats(stats) {
  document.getElementById('statTotal').textContent = stats.total || 0;
  document.getElementById('statEnabled').textContent = stats.enabled || 0;
  document.getElementById('statDisabled').textContent = stats.disabled || 0;
  document.getElementById('statRequests').textContent = stats.totalRequests || 0;
}

function renderTable(aliases) {
  const tbody = document.getElementById('tableBody');
  if (aliases.length === 0) {
    tbody.innerHTML = '<tr class="empty"><td colspan="9">No aliases found. Create one to get started.</td></tr>';
    return;
  }
  tbody.innerHTML = aliases.map((a, i) => {
    const s = a.stats || {};
    const successRate = s.totalRequests > 0 ? ((s.successfulRequests / s.totalRequests) * 100).toFixed(0) : '—';
    return `<tr>
      <td><label class="toggle"><input type="checkbox" ${a.enabled ? 'checked' : ''} onchange="toggleAlias('${esc(a.name)}', this.checked)"><span class="slider"></span></label></td>
      <td><span class="prio">${a.priority}</span></td>
      <td><code>${esc(a.name)}</code></td>
      <td>${esc(a.target)}</td>
      <td><span class="badge badge-${a.targetType}">${a.targetType}</span>
          ${a.enabled ? '' : '<span class="badge badge-disabled" style="margin-left:4px">disabled</span>'}</td>
      <td>${s.totalRequests || 0}</td>
      <td>${successRate}${successRate !== '—' ? '%' : ''}</td>
      <td style="color:var(--text-dim);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.description || '—')}</td>
      <td>
        <button class="btn btn-sm" onclick="openEdit('${esc(a.name)}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="confirmDelete('${esc(a.name)}')">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function renderPagination(data) {
  const el = document.getElementById('pagination');
  if (data.totalPages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  html += `<button class="btn btn-sm" onclick="loadAliases(${data.page - 1})" ${data.page <= 1 ? 'disabled' : ''}>←</button>`;
  html += `<span class="info">Page ${data.page} of ${data.totalPages} (${data.total} total)</span>`;
  html += `<button class="btn btn-sm" onclick="loadAliases(${data.page + 1})" ${data.page >= data.totalPages ? 'disabled' : ''}>→</button>`;
  el.innerHTML = html;
}

// ─── CRUD ───
function openCreate() {
  editingName = null;
  document.getElementById('modalTitle').textContent = 'Create Alias';
  document.getElementById('modalSaveBtn').textContent = 'Create Alias';
  document.getElementById('inputName').value = '';
  document.getElementById('inputName').disabled = false;
  document.getElementById('inputTarget').value = 'Coding';
  document.getElementById('inputTargetType').value = 'combo';
  document.getElementById('inputPriority').value = '0';
  document.getElementById('inputDescription').value = '';
  document.getElementById('inputEnabled').checked = true;
  document.getElementById('modalErrors').style.display = 'none';
  document.getElementById('errorName').textContent = '';
  document.getElementById('errorTarget').textContent = '';
  document.getElementById('modalOverlay').classList.add('active');
  updateTargetHelp();
}

async function openEdit(name) {
  try {
    const res = await fetch(`${API}/${encodeURIComponent(name)}`);
    if (!res.ok) { showError('Alias not found'); return; }
    const a = await res.json();
    editingName = a.name;
    document.getElementById('modalTitle').textContent = 'Edit Alias';
    document.getElementById('modalSaveBtn').textContent = 'Save Changes';
    document.getElementById('inputName').value = a.name;
    document.getElementById('inputName').disabled = true;
    document.getElementById('inputTarget').value = a.target;
    document.getElementById('inputTargetType').value = a.targetType;
    document.getElementById('inputPriority').value = a.priority ?? 0;
    document.getElementById('inputDescription').value = a.description || '';
    document.getElementById('inputEnabled').checked = a.enabled;
    document.getElementById('modalErrors').style.display = 'none';
    document.getElementById('errorName').textContent = '';
    document.getElementById('errorTarget').textContent = '';
    document.getElementById('modalOverlay').classList.add('active');
    updateTargetHelp();
  } catch { showError('Failed to load alias'); }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  editingName = null;
}

function updateTargetHelp() {
  const type = document.getElementById('inputTargetType').value;
  document.getElementById('targetLabel').textContent = type === 'combo' ? 'Target Combo Profile' : 'Target Model ID';
  document.getElementById('inputTarget').placeholder = type === 'combo' ? 'e.g. Coding' : 'e.g. openrouter/model-id';
}

async function saveAlias() {
  document.getElementById('modalErrors').style.display = 'none';
  document.getElementById('errorName').textContent = '';
  document.getElementById('errorTarget').textContent = '';

  const name = document.getElementById('inputName').value.trim();
  const target = document.getElementById('inputTarget').value.trim();
  const targetType = document.getElementById('inputTargetType').value;
  const priority = parseInt(document.getElementById('inputPriority').value) || 0;
  const description = document.getElementById('inputDescription').value.trim();
  const enabled = document.getElementById('inputEnabled').checked;
  let errors = [];

  if (!name) errors.push('Name is required');
  if (!target) errors.push('Target is required');
  if (targetType === 'combo' && !COMBO_PROFILES.includes(target)) errors.push(`Invalid combo profile "${target}". Valid: ${COMBO_PROFILES.join(', ')}`);

  if (errors.length > 0) {
    document.getElementById('modalErrors').textContent = errors.join('; ');
    document.getElementById('modalErrors').style.display = 'block';
    return;
  }

  if (editingName) {
    try {
      const res = await fetch(`${API}/${encodeURIComponent(editingName)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target, targetType, priority, description, enabled }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Update failed'); return; }
      showSuccess('Alias updated');
      closeModal();
      loadAliases();
    } catch { showError('Update failed'); }
  } else {
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, target, targetType, enabled, priority, description }),
      });
      const data = await res.json();
      if (!res.ok) {
        const msg = data.errors ? data.errors.map(e => e.message).join('; ') : data.error || 'Create failed';
        showError(msg);
        return;
      }
      showSuccess('Alias created');
      closeModal();
      loadAliases(1);
    } catch { showError('Create failed'); }
  }
}

async function toggleAlias(name, enabled) {
  try {
    const res = await fetch(`${API}/${encodeURIComponent(name)}/toggle`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled }),
    });
    if (!res.ok) { showError('Toggle failed'); }
    loadAliases();
  } catch { showError('Toggle failed'); loadAliases(); }
}

function confirmDelete(name) {
  if (!confirm(`Delete alias "${name}"? This cannot be undone.`)) return;
  fetch(`${API}/${encodeURIComponent(name)}`, { method: 'DELETE' })
    .then(r => r.ok ? (showSuccess('Deleted'), loadAliases()) : showError('Delete failed'))
    .catch(() => showError('Delete failed'));
}

// ─── Import / Export ───
document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const aliases = data.aliases || data;
    if (!Array.isArray(aliases)) throw new Error('Not an array');
    const overwrite = confirm('Overwrite existing aliases? OK=overwrite, Cancel=skip duplicates.');
    const res = await fetch(`${API}/import`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ aliases, overwrite }),
    });
    const result = await res.json();
    if (!res.ok) { showError(result.error || 'Import failed'); }
    else { showSuccess(`Imported: ${result.imported}, Skipped: ${result.skipped}, Errors: ${(result.errors||[]).length}`); loadAliases(); }
  } catch (err) { showError('Invalid file: ' + err.message); }
  e.target.value = '';
});

function exportAliases() { window.open(`${API}/export/download`, '_blank'); }

// ─── Preview / Test ───
async function previewAlias() {
  const model = document.getElementById('previewInput').value.trim();
  if (!model) return;
  const el = document.getElementById('previewResult');
  el.style.display = 'block';
  try {
    const res = await fetch(`${API}/test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model }),
    });
    const data = await res.json();
    if (!data.found) {
      el.className = 'test-result not-found';
      el.textContent = `✗ "${model}" → No alias found (treated as direct model ID)`;
    } else if (!data.enabled) {
      el.className = 'test-result disabled';
      el.textContent = `⚠ "${model}" → ${data.alias.target} (${data.alias.targetType}) — ⚠ ALIAS IS DISABLED`;
    } else {
      el.className = 'test-result success';
      el.textContent = `✓ "${model}" → ${data.alias.target} (${data.alias.targetType}) | ${data.alias.priority > 0 ? 'Priority: '+data.alias.priority : ''} | ${data.alias.description || ''}`;
    }
  } catch {
    el.className = 'test-result not-found';
    el.textContent = '✗ Preview failed';
  }
}

// ─── Utilities ───
function refreshAll() { loadAliases(1); }
function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(() => loadAliases(1), 250); }
function esc(s) { if(!s)return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function showSuccess(msg) { showToast(msg, 'toast-success'); }
function showError(msg) { showToast(msg, 'toast-error'); }
function showToast(msg, cls) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${cls}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

document.addEventListener('DOMContentLoaded', () => loadAliases(1));
document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>
